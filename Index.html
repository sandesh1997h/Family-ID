<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
 <title>Family ID Manager — Premium Dark</title>
<!-- Optional web fonts (falls back to system fonts if offline) -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@500;700&disp… rel="stylesheet">
 <style>
 :root {
 --bg: #000000; /* Matte black */
 --fg: #FFFFFF; /* Crisp white */
 --muted: #BFBFBF; /* Muted grey */
 --card: #0A0A0A; /* Panels */
 --border: #1F1F1F; /* Lines */
 --input: #121212; /* Inputs */
 --accent: #7C5CFF; /* Electric violet accent */
 --accent-2: #00E5FF; /* Cyan accent for hovers */
 --danger: #FF4D4F;
 --warning: #F5A623;
 --success: #1DB954;
 --shadow: 0 0 0 1px var(--border), 0 10px 30px rgba(0,0,0,0.6);
 --radius: 14px;
 }

/* Base */
 * { box-sizing: border-box; }
 html, body { height: 100%; }
 body {
 margin: 0;
 background: var(--bg);
 color: var(--fg);
 font-family: "Inter", "Montserrat", system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;
 line-height: 1.5;
 -webkit-font-smoothing: antialiased;
 -moz-osx-font-smoothing: grayscale;
 }

 .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

 header.app-header {
 display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 22px;
 }

 .brand { display: flex; align-items: center; gap: 14px; }
 .brand-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: 0 8px 24px rgba(124,92,255,0.35); }
 .brand h1 { font-size: 1.25rem; margin: 0; font-weight: 800; letter-spacing: 0.3px; }
 .brand h1 span { color: var(--accent-2); }

 .surface { background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) , var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
 .panel { padding: 18px; }

 .section-title { margin: 0 0 14px; font-size: 0.95rem; font-weight: 700; color: var(--muted); letter-spacing: 0.4px; text-transform: uppercase; }

 .row { display: flex; gap: 12px; flex-wrap: wrap; }
 .grow { flex: 1 1 260px; }

 input[type="text"], input[type="password"], textarea {
 width: 100%; padding: 12px 14px; border-radius: 12px; background: var(--input); color: var(--fg);
 border: 1px solid var(--border); outline: none; font-size: 0.98rem; transition: border-color .2s, box-shadow .2s;
 }
 textarea { min-height: 110px; resize: vertical; }

 input[type="text"]:focus, input[type="password"]:focus, textarea:focus { border-color: var(--accent-2); box-shadow: 0 0 0 4px rgba(0,229,255,0.14); }

 .btn { appearance: none; border: 1px solid var(--border); background: #0E0E10; color: var(--fg); padding: 10px 14px; border-radius: 12px; font-weight: 700; letter-spacing: .2px; cursor: pointer; transition: 120ms ease-in-out; display: inline-flex; align-items: center; gap: 10px; }
 .btn:hover { border-color: var(--accent-2); color: var(--accent-2); }
 .btn:focus { outline: none; box-shadow: 0 0 0 4px rgba(124,92,255,0.25); }

 .btn-primary { background: linear-gradient(180deg, rgba(124,92,255,0.15), rgba(124,92,255,0)); border-color: #2B2157; color: #E9E7FF; }
 .btn-primary:hover { border-color: var(--accent); color: #FFFFFF; }

 .btn-danger { border-color: #3A0E11; background: #170001; color: #FFB3B4; }
 .btn-danger:hover { border-color: var(--danger); color: #FFFFFF; }

 .btn-ghost { background: transparent; }
 .btn-sm { padding: 6px 10px; border-radius: 10px; font-size: .85rem; }

 .help { color: var(--muted); font-size: 0.9rem; margin-top: 8px; }

 .list { margin-top: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

 .item { padding: 14px; border-radius: 12px; background: #0B0B0D; border: 1px solid var(--border); transition: transform .12s ease, border-color .12s ease; }
 .item:hover { transform: translateY(-2px); border-color: var(--accent-2); }
 .item h3 { margin: 0 0 8px; font-size: 1rem; letter-spacing: .2px; }
 .item small { color: var(--muted); }

 .empty { padding: 26px; text-align: center; color: var(--muted); border: 1px dashed var(--border); border-radius: 12px; background: #070707; }

 .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
 .actions { display: flex; gap: 8px; flex-wrap: wrap; }

 .divider { height: 1px; background: var(--border); margin: 14px 0; border-radius: 1px; }

 .hidden { display: none !important; }

 .member-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
 .crumbs { display: flex; align-items: center; gap: 8px; color: var(--muted); }
 .crumbs .sep { opacity: .6; }
 .badge { padding: 6px 10px; border: 1px solid var(--border); border-radius: 999px; color: var(--muted); font-weight: 700; font-size: .8rem; }

 .id-card { padding: 14px; border-radius: 12px; background: #0B0B0D; border: 1px solid var(--border); }
 .id-title { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
 .id-title h4 { margin: 0; font-size: 1rem; }
 .id-title time { color: var(--muted); font-size: .8rem; }
 .id-body pre { margin: 8px 0 0; background: #0F0F10; border: 1px solid var(--border); padding: 10px 12px; border-radius: 10px; color: var(--fg); white-space: pre-wrap; word-break: break-word; }
 .edit-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 10px 0; }

/* Lock screen */
 .lock-wrap { min-height: 100vh; display: grid; place-items: center; padding: 28px 16px; }
 .lock-card { width: 100%; max-width: 420px; }
 .lock-title { margin: 0 0 12px; font-weight: 800; letter-spacing: .2px; }
 .center { text-align: center; }
 </style>
</head>
<body>

<!-- LOCK VIEW (shown before app unlock) -->
 <div id="lockView" class="lock-wrap">
 <div class="surface panel lock-card">
 <h2 id="lockTitle" class="lock-title">Set 4‑Digit PIN</h2>
 <div id="lockSetup" class="">
 <label class="help" for="pin1">Enter PIN</label>
 <input id="pin1" type="password" inputmode="numeric" pattern="\\d{4}" maxlength="4" placeholder="••••" autocomplete="off" />
 <label class="help" for="pin2" style="margin-top:10px; display:block;">Confirm PIN</label>
 <input id="pin2" type="password" inputmode="numeric" pattern="\\d{4}" maxlength="4" placeholder="••••" autocomplete="off" />
 <div class="row" style="margin-top:14px; align-items:center;">
 <div class="grow"></div>
 <div class="actions">
 <button id="setPinBtn" class="btn btn-primary">Save PIN</button>
 </div>
 </div>
 <div id="lockHelp" class="help"></div>
 </div>

 <div id="lockEnter" class="hidden">
 <label class="help" for="pinEnter">Enter PIN</label>
 <input id="pinEnter" type="password" inputmode="numeric" pattern="\\d{4}" maxlength="4" placeholder="••••" autocomplete="off" />
 <div class="row" style="margin-top:14px; align-items:center;">
 <div class="grow"></div>
 <div class="actions">
 <button id="unlockBtn" class="btn btn-primary">Unlock</button>
 </div>
 </div>
 <div id="enterHelp" class="help"></div>
 <div class="divider"></div>
 <div class="center">
 <button id="resetAllBtn" class="btn btn-danger btn-sm" title="Clears all data (members & PIN)">Forgot PIN? Reset app</button>
 </div>
 </div>
 </div>
 </div>

<!-- APP BODY (hidden until unlocked) -->
 <div class="container app-body hidden" id="appBody">
 <header class="app-header">
 <div class="brand">
 <div class="brand-mark" aria-hidden="true"></div>
 <h1>Family <span>ID</span> Manager</h1>
 </div>
 <div class="toolbar">
 <input id="importFile" type="file" accept="application/json" class="hidden" />
 <button class="btn btn-ghost btn-sm" id="exportBtn" title="Export data to JSON">Export</button>
 <button class="btn btn-ghost btn-sm" id="importBtn" title="Import data from JSON">Import</button>
 <div class="badge" id="statsBadge">0 members</div>
 </div>
 </header>

<!-- HOME VIEW -->
 <section id="homeView" class="surface panel" aria-label="Home — Family Members">
 <h2 class="section-title">Family Members</h2>

 <div class="row">
 <div class="grow">
 <label for="memberName" class="help">Add a family member</label>
 <input id="memberName" type="text" placeholder="e.g., Priya, Arjun, Dad, Mom" autocomplete="off" />
 <div id="memberNameHelp" class="help"></div>
 </div>
 <div>
 <button class="btn btn-primary" id="addMemberBtn" style="height: 44px; margin-top: 22px;">Add Member</button>
 </div>
 </div>

 <div class="divider"></div>

 <div id="membersList"></div>
 </section>

<!-- MEMBER VIEW -->
 <section id="memberView" class="surface panel hidden" aria-label="Member — IDs">
 <div class="member-head">
 <div class="crumbs">
 <button class="btn btn-ghost" id="backHomeBtn">⟵ Home</button>
 <span class="sep">/</span>
 <strong id="memberNameTitle">Member</strong>
 </div>
 <div class="badge" id="idCountBadge">0 IDs</div>
 </div>

 <div class="divider"></div>

 <h3 class="section-title">Add ID & Details</h3>
 <div class="row">
 <div class="grow">
 <label class="help" for="idName">ID Name</label>
 <input id="idName" type="text" placeholder="e.g., Passport, PAN, Employee ID" autocomplete="off" />
 </div>
 <div class="grow">
 <label class="help" for="idDetails">Details</label>
 <textarea id="idDetails" placeholder="Add the ID details here…"></textarea>
 </div>
 <div>
 <button class="btn btn-primary" id="addIdBtn" style="height: 44px; margin-top: 22px;">Add</button>
 </div>
 </div>
 <div id="idFormHelp" class="help"></div>

 <div class="divider"></div>

 <div id="idsList"></div>
 </section>
 </div>

 <script>
 (() => {
 const STORAGE_KEY = 'familyIdManager_v1';
 const PIN_KEY = 'familyIdManager_PIN_v1';
 const $ = (sel) => document.querySelector(sel);

// State
 const state = {
 data: { members: [] },
 selectedMemberId: null,
 pinMeta: null, // { salt: base64, hash: base64 }
 };

// Utils
 const uuid = () => {
 if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
 return 'id-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
 };
 const nowISO = () => new Date().toISOString();
 const fmtDate = (iso) => { try { return new Date(iso).toLocaleString(); } catch { return iso; } };
 const toBase64 = (buffer) => btoa(String.fromCharCode(...new Uint8Array(buffer)));
 const fromText = (str) => new TextEncoder().encode(str);
 const sha256 = async (text) => {
 const data = fromText(text);
 const hash = await crypto.subtle.digest('SHA-256', data);
 return toBase64(hash);
 };
 const randomSaltB64 = () => {
 const arr = new Uint8Array(16);
 crypto.getRandomValues(arr);
 return btoa(String.fromCharCode(...arr));
 };

 const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
 const load = () => {
 try {
 const raw = localStorage.getItem(STORAGE_KEY);
 if (raw) state.data = JSON.parse(raw);
 if (!state.data || !Array.isArray(state.data.members)) state.data = { members: [] };
 } catch (e) {
 console.warn('Failed to parse storage, resetting.', e);
 state.data = { members: [] };
 }
 };
 const loadPin = () => {
 try {
 const raw = localStorage.getItem(PIN_KEY);
 if (!raw) return null;
 const meta = JSON.parse(raw);
 if (meta && meta.salt && meta.hash) return meta;
 } catch {}
 return null;
 };
 const setPin = async (pin) => {
 const salt = randomSaltB64();
 const hash = await sha256(pin + ':' + salt);
 const meta = { salt, hash, setAt: nowISO() };
 localStorage.setItem(PIN_KEY, JSON.stringify(meta));
 state.pinMeta = meta;
 };
 const verifyPin = async (pin) => {
 if (!state.pinMeta) return false;
 const { salt, hash } = state.pinMeta;
 const h = await sha256(pin + ':' + salt);
 return h === hash;
 };

 const getMember = (id) => state.data.members.find(m => m.id === id) || null;

// Rendering
 const renderStats = () => {
 $('#statsBadge').textContent = `${state.data.members.length} member${state.data.members.length === 1 ? '' : 's'}`;
 };

 const renderHome = () => {
 $('#homeView').classList.remove('hidden');
 $('#memberView').classList.add('hidden');
 $('#memberName').value = '';
 $('#memberNameHelp').textContent = '';

 const wrap = document.createElement('div');
 const members = state.data.members;

 if (!members.length) {
 wrap.innerHTML = `<div class="empty">No members yet. Add a name above to get started.</div>`;
 } else {
 const grid = document.createElement('div');
 grid.className = 'list';
 members.forEach(m => {
 const el = document.createElement('div');
 el.className = 'item';
 el.innerHTML = `
 <h3>${escapeHtml(m.name)}</h3>
 <div class="actions" style="margin-bottom:8px;">
 <button class="btn btn-sm btn-primary" data-action="open" data-id="${m.id}">Open</button>
 <button class="btn btn-sm" data-action="rename" data-id="${m.id}">Rename</button>
 <button class="btn btn-sm btn-danger" data-action="delete" data-id="${m.id}">Delete</button>
 </div>
 <small>${m.ids.length} ID${m.ids.length === 1 ? '' : 's'}</small>
 `;
 el.addEventListener('click', (ev) => {
 const btn = ev.target.closest('button');
 if (!btn) return; // click outside buttons does nothing
 const action = btn.dataset.action;
 const id = btn.dataset.id;
 if (action === 'open') {
 state.selectedMemberId = id; renderMember();
 } else if (action === 'rename') {
 const member = getMember(id);
 if (!member) return;
 const newName = prompt('Rename member', member.name);
 if (newName === null) return; // cancelled
 const name = newName.trim();
 if (!name) { alert('Name cannot be empty.'); return; }
 const exists = state.data.members.some(x => x.id !== id && x.name.toLowerCase() === name.toLowerCase());
 if (exists) { alert('Another member with this name already exists.'); return; }
 member.name = name; save(); renderHome();
 } else if (action === 'delete') {
 const member = getMember(id);
 if (!member) return;
 if (confirm(`Delete member "${member.name}" and all their IDs?`)) {
 state.data.members = state.data.members.filter(x => x.id !== id);
 save(); renderHome();
 }
 }
 });
 grid.appendChild(el);
 });
 wrap.appendChild(grid);
 }
 const listHost = $('#membersList');
 listHost.innerHTML = '';
 listHost.appendChild(wrap);
 renderStats();
 };

 const renderMember = () => {
 const member = getMember(state.selectedMemberId);
 if (!member) { renderHome(); return; }
 $('#homeView').classList.add('hidden');
 $('#memberView').classList.remove('hidden');
 $('#memberNameTitle').textContent = member.name;

// Reset form
 $('#idName').value = '';
 $('#idDetails').value = '';
 $('#idFormHelp').textContent = '';

 const listHost = $('#idsList');
 listHost.innerHTML = '';

 if (!member.ids.length) {
 listHost.innerHTML = '<div class="empty">No IDs yet for this member. Add one above.</div>';
 } else {
 const grid = document.createElement('div');
 grid.className = 'list';
 member.ids.forEach(record => {
 const card = document.createElement('div');
 card.className = 'id-card';
 card.dataset.id = record.id;
 card.innerHTML = `
 <div class="id-title">
 <h4>${escapeHtml(record.name)}</h4>
 <time title="Created At">${fmtDate(record.createdAt)}</time>
 </div>
 <div class="id-body">
 <pre>${escapeHtml(record.details)}</pre>
 </div>
 <div class="actions" style="margin-top: 10px;">
 <button class="btn btn-ghost" data-action="copy">Copy Details</button>
 <button class="btn" data-action="edit">Edit</button>
 <button class="btn btn-danger" data-action="delete">Delete</button>
 </div>
 `;

 card.addEventListener('click', async (ev) => {
 const btn = ev.target.closest('button');
 if (!btn) return;
 const action = btn.dataset.action;
 if (action === 'copy') {
 try {
 await copyToClipboard(record.details);
 const old = btn.textContent; btn.textContent = 'Copied!';
 setTimeout(() => (btn.textContent = old), 1200);
 } catch { alert('Copy failed. You can select and copy manually.'); }
 } else if (action === 'delete') {
 if (confirm('Delete this ID entry?')) {
 member.ids = member.ids.filter(x => x.id !== record.id);
 save(); renderMember();
 }
 } else if (action === 'edit') {
 enterEditMode(card, member, record);
 } else if (action === 'save-edit') {
 const newName = card.querySelector('input[name="editName"]').value.trim();
 const newDetails = card.querySelector('textarea[name="editDetails"]').value.trim();
 if (!newName || !newDetails) { alert('Both ID Name and Details are required.'); return; }
 record.name = newName; record.details = newDetails; record.updatedAt = nowISO();
 save(); renderMember();
 } else if (action === 'cancel-edit') {
 renderMember();
 }
 });

 grid.appendChild(card);
 });
 listHost.appendChild(grid);
 }

 $('#idCountBadge').textContent = `${member.ids.length} ID${member.ids.length === 1 ? '' : 's'}`;
 };

// Editing helpers
 const enterEditMode = (card, member, record) => {
 const body = card.querySelector('.id-body');
 const actions = card.querySelector('.actions');
 const title = card.querySelector('.id-title');
 const titleText = escapeHtml(record.name);

 title.innerHTML = `<h4>Editing: ${titleText}</h4><span></span>`;
 body.innerHTML = `
 <div class="edit-grid">
 <div>
 <label class="help">ID Name</label>
 <input name="editName" type="text" value="${escapeAttr(record.name)}" />
 </div>
 <div>
 <label class="help">Details</label>
 <textarea name="editDetails">${escapeHtml(record.details)}</textarea>
 </div>
 </div>
 `;
 actions.innerHTML = `
 <button class="btn btn-primary" data-action="save-edit">Save</button>
 <button class="btn" data-action="cancel-edit">Cancel</button>
 `;
 };

// Escape helpers
 const escapeHtml = (str = '') => str
 .replaceAll('&', '&amp;')
 .replaceAll('<', '&lt;')
 .replaceAll('>', '&gt;')
 .replaceAll('"', '&quot;')
 .replaceAll("'", '&#39;');
 const escapeAttr = (str = '') => escapeHtml(str).replaceAll('\n', '&#10;');

// Clipboard
 const copyToClipboard = async (text) => {
 if (navigator.clipboard && navigator.clipboard.writeText) {
 return navigator.clipboard.writeText(text);
 }
 const ta = document.createElement('textarea');
 ta.value = text; document.body.appendChild(ta); ta.select();
 try { document.execCommand('copy'); } finally { document.body.removeChild(ta); }
 };

// Export/Import
 const exportData = () => {
 const payload = { version: 1, exportedAt: nowISO(), data: state.data };
 const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 const ts = new Date().toISOString().replace(/[:T]/g, '-').slice(0,19);
 a.href = url; a.download = `family_id_backup_${ts}.json`;
 document.body.appendChild(a); a.click(); a.remove();
 URL.revokeObjectURL(url);
 };

 const importData = (obj, replace) => {
 try {
 if (!obj || !obj.data || !Array.isArray(obj.data.members)) throw new Error('Invalid file');
 if (replace) {
 state.data = obj.data;
 } else {
// Merge by member name (case-insensitive). If same name, append IDs that don't duplicate by id.
 const incoming = obj.data.members;
 incoming.forEach(im => {
 const existing = state.data.members.find(m => m.name.toLowerCase() === String(im.name).toLowerCase());
 if (!existing) {
 state.data.members.push(im);
 } else {
 const existingIds = new Set(existing.ids.map(x => x.id));
 (im.ids || []).forEach(rec => { if (!existingIds.has(rec.id)) existing.ids.push(rec); });
 }
 });
 }
 save();
 renderHome();
 alert('Import completed successfully.');
 } catch (e) {
 alert('Import failed: ' + (e && e.message ? e.message : 'Unknown error'));
 }
 };

// Actions
 const addMember = () => {
 const name = $('#memberName').value.trim();
 const help = $('#memberNameHelp');
 if (!name) { help.textContent = 'Please enter a name.'; return; }
 const exists = state.data.members.some(m => m.name.toLowerCase() === name.toLowerCase());
 if (exists) { help.textContent = 'This name already exists.'; return; }
 state.data.members.push({ id: uuid(), name, createdAt: nowISO(), ids: [] });
 save(); renderHome();
 };

 const addId = () => {
 const member = getMember(state.selectedMemberId);
 if (!member) return renderHome();
 const name = $('#idName').value.trim();
 const details = $('#idDetails').value.trim();
 const help = $('#idFormHelp');
 if (!name || !details) { help.textContent = 'Both fields are required.'; return; }
 member.ids.unshift({ id: uuid(), name, details, createdAt: nowISO() });
 save(); renderMember();
 };

// Lock screen wiring
 const showSetupPin = () => {
 $('#lockTitle').textContent = 'Set 4‑Digit PIN';
 $('#lockSetup').classList.remove('hidden');
 $('#lockEnter').classList.add('hidden');
 $('#pin1').value = ''; $('#pin2').value = ''; $('#lockHelp').textContent = '';
 };
 const showEnterPin = () => {
 $('#lockTitle').textContent = 'Enter PIN';
 $('#lockSetup').classList.add('hidden');
 $('#lockEnter').classList.remove('hidden');
 $('#pinEnter').value = ''; $('#enterHelp').textContent = '';
 };
 const unlockApp = () => {
 $('#lockView').classList.add('hidden');
 $('#appBody').classList.remove('hidden');
 };

 const wireLock = () => {
 $('#setPinBtn').addEventListener('click', async () => {
 const p1 = $('#pin1').value.trim();
 const p2 = $('#pin2').value.trim();
 const help = $('#lockHelp');
 const pinRegex = /^\d{4}$/;
 if (!pinRegex.test(p1)) { help.textContent = 'PIN must be exactly 4 digits.'; return; }
 if (p1 !== p2) { help.textContent = 'PINs do not match.'; return; }
 await setPin(p1);
 unlockApp();
 renderHome();
 });
 $('#pin2').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#setPinBtn').click(); });

 $('#unlockBtn').addEventListener('click', async () => {
 const p = $('#pinEnter').value.trim();
 const help = $('#enterHelp');
 if (!/^\d{4}$/.test(p)) { help.textContent = 'PIN must be exactly 4 digits.'; return; }
 const ok = await verifyPin(p);
 if (!ok) { help.textContent = 'Incorrect PIN. Try again.'; return; }
 unlockApp();
 renderHome();
 });
 $('#pinEnter').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#unlockBtn').click(); });

 $('#resetAllBtn').addEventListener('click', () => {
 if (confirm('This will CLEAR all members and the PIN. Continue?')) {
 localStorage.removeItem(STORAGE_KEY);
 localStorage.removeItem(PIN_KEY);
 location.reload();
 }
 });
 };

// App wiring
 const wireApp = () => {
 $('#addMemberBtn').addEventListener('click', addMember);
 $('#memberName').addEventListener('keydown', (e) => { if (e.key === 'Enter') addMember(); });

 $('#backHomeBtn').addEventListener('click', renderHome);
 $('#addIdBtn').addEventListener('click', addId);
 $('#idName').addEventListener('keydown', (e) => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addId(); });

// Export/Import
 $('#exportBtn').addEventListener('click', exportData);
 const fileInput = $('#importFile');
 $('#importBtn').addEventListener('click', () => fileInput.click());
 fileInput.addEventListener('change', (e) => {
 const file = e.target.files && e.target.files[0];
 if (!file) return;
 const reader = new FileReader();
 reader.onload = () => {
 try {
 const obj = JSON.parse(reader.result);
 const replace = confirm('Click OK to REPLACE existing data with the file. Click Cancel to MERGE.');
 importData(obj, replace);
 } catch (err) {
 alert('Invalid JSON file.');
 } finally {
 fileInput.value = '';
 }
 };
 reader.readAsText(file);
 });
 };

// Init
 const init = () => {
 load();
 state.pinMeta = loadPin();
 wireLock();
 wireApp();
 if (state.pinMeta) {
 showEnterPin();
 } else {
 showSetupPin();
 }
 };

 document.addEventListener('DOMContentLoaded', init);
 })();
 </script>
